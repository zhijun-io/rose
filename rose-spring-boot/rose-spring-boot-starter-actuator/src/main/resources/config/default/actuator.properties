## Rose Actuator Spring Boot AutoConfigure Default Properties

### Actuator Task Scheduler (MonitoredThreadPoolTaskScheduler)
rose.actuator.task-scheduler.pool-size = 1
rose.actuator.task-scheduler.thread-name-prefix = rose-actuator-task-

management.endpoints.enabled-by-default = false

## Web Endpoints
management.endpoints.web.exposure.include = *

## JMX Endpoints
management.endpoints.jmx.exposure.exclude = *

## Enabled Endpoints
management.endpoint.auditevents.enabled = false
management.endpoint.beans.enabled = false
management.endpoint.caches.enabled = false
management.endpoint.conditions.enabled = false
management.endpoint.configprops.enabled = false
management.endpoint.env.enabled = true
management.endpoint.flyway.enabled = false
management.endpoint.health.enabled = true
management.endpoint.httptrace.enabled = false
management.endpoint.info.enabled = true
management.endpoint.integrationgraph.enabled = false
management.endpoint.loggers.enabled = true
management.endpoint.liquibase.enabled = false
management.endpoint.metrics.enabled = true
management.endpoint.mappings.enabled = true
management.endpoint.scheduledtasks.enabled = false
management.endpoint.sessions.enabled = false
management.endpoint.shutdown.enabled = false
management.endpoint.threaddump.enabled = false
management.endpoint.heapdump.enabled = false
management.endpoint.jolokia.enabled = true
management.endpoint.logfile.enabled = false
management.endpoint.prometheus.enabled = true

## Health Endpoint
management.health.defaults.enabled = true
management.endpoint.health.show-details = always
management.endpoint.health.show-components = always

### Artifacts Endpoint
management.endpoint.artifacts.enabled = true
management.endpoints.web.path-mapping.artifacts = rose/artifacts

### WebEndpoints Endpoint
management.endpoint.webEndpoints.enabled = true
management.endpoints.web.path-mapping.webEndpoints = rose/web/endpoints

### ConfigurationMetadata Endpoint
management.endpoint.configMetadata.enabled = true
management.endpoints.web.path-mapping.configMetadata = rose/config/metadata

### ConfigurationPropertiesEndpoint Endpoint
management.endpoint.configProperties.enabled = true
management.endpoints.web.path-mapping.configProperties = rose/config/properties
