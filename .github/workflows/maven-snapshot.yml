name: Maven Publish Snapshot

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '.editorconfig'
      - '.gitattributes'
      - '.gitignore'
      - '**/*.md'
      - 'docs/**'
      - '.github/**'

permissions:
  contents: read

concurrency:
  group: maven-snapshot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-snapshot-version:
    runs-on: ubuntu-24.04
    outputs:
      is_snapshot: ${{ steps.revision.outputs.is_snapshot }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Detect SNAPSHOT revision
        id: revision
        shell: bash
        run: |
          set -euo pipefail
          REVISION="$(grep -m1 '<revision>' pom.xml | sed 's|.*<revision>\(.*\)</revision>.*|\1|')"
          echo "revision=${REVISION}"
          if [[ "${REVISION}" == *-SNAPSHOT ]]; then
            echo "is_snapshot=true" >> "${GITHUB_OUTPUT}"
          else
            echo "is_snapshot=false" >> "${GITHUB_OUTPUT}"
          fi

  publish:
    needs: check-snapshot-version
    if: needs.check-snapshot-version.outputs.is_snapshot == 'true'
    uses: zhijun-io/workflows/.github/workflows/maven-snapshot.yml@main
    with:
      java-version: '8'
      use-maven-wrapper: false
      maven-profiles: release
      verify-first: false
    secrets:
      MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
