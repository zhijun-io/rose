name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit:
    name: Unit tests (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        java: [8, 11, 17, 21, 25]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Run Maven enforcer rules
        run: ./mvnw -B -ntp validate

      - name: Build and run unit tests
        run: ./mvnw -B -ntp verify -DskipITs

  integration:
    name: Integration tests (Java 17)
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build and run unit and integration tests
        run: ./mvnw -B -ntp -Pcoverage verify

      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: jacoco-report-java-17
          path: |
            **/target/site/jacoco/jacoco.xml
            **/target/site/jacoco-it/jacoco.xml
          if-no-files-found: warn
          retention-days: 14

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          slug: zhijun-io/rose
