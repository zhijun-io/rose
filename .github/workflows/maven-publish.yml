# Inspired by https://github.com/microsphere-projects/microsphere-build/blob/main/.github/workflows/maven-publish.yml

name: Maven Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'The version to publish'
        required: true
        type: string

concurrency:
  group: maven-publish
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$'; then
            echo "Error: version '${{ inputs.version }}' is not a valid release version"
            exit 1
          fi

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Maven Central Repository
        uses: actions/setup-java@v4
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        with:
          java-version: '8'
          distribution: temurin
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          cache: maven

      - name: Publish package
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: mvn -B -ntp -U clean deploy -Prelease -Drevision=${{ inputs.version }}

  release:
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: write
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com

      - name: Create Tag
        run: |
          TAG="v${VERSION}"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists, skipping."
          else
            git tag "${TAG}"
            git push origin "${TAG}"
          fi

      - name: Generate and update CHANGELOG with Cloudflare AI
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_AI_MODEL: ${{ vars.CF_AI_MODEL }}
        run: |
          set -euo pipefail
          if [ ! -f CHANGELOG.md ]; then
            echo "CHANGELOG.md not found."
            exit 1
          fi
          PREV_TAG="$(git tag -l 'v*' --sort=-v:refname | grep -Fxv "v${VERSION}" | head -1 || true)"
          if [ -n "${PREV_TAG}" ]; then
            COMMITS="$(git log --oneline "${PREV_TAG}..HEAD" || true)"
            SINCE_LABEL="${PREV_TAG}"
          else
            COMMITS="$(git log --oneline -50 || true)"
            SINCE_LABEL="the beginning"
          fi
          export PREV_TAG SINCE_LABEL COMMITS

          python3 << 'PYEOF'
          import json, os, re, urllib.request
          from datetime import date
          from pathlib import Path

          version = os.environ["VERSION"]
          prev_tag = os.environ.get("PREV_TAG", "")
          since_label = os.environ["SINCE_LABEL"]
          commits = os.environ.get("COMMITS", "")
          today = date.today().isoformat()
          repo_base = f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}"
          repo_name = os.environ["GITHUB_REPOSITORY"]
          model = os.environ.get("CF_AI_MODEL", "").strip() or "@cf/meta/llama-3.1-8b-instruct"

          unreleased_link = f"{repo_base}/compare/v{version}...HEAD"
          version_link = (
              f"{repo_base}/compare/{prev_tag}...v{version}"
              if prev_tag else f"{repo_base}/releases/tag/v{version}"
          )

          changelog_path = Path("CHANGELOG.md")
          current = changelog_path.read_text(encoding="utf-8")
          heading = f"## [{version}] - {today}"

          def fallback_body():
              return (
                  f"_Release notes generation unavailable. Raw commits since {since_label}:_\n\n"
                  f"```\n{commits}\n```"
              )

          def apply_fallback(text):
              body = fallback_body()
              if not re.search(rf"^## \[{re.escape(version)}\] - \d{{4}}-\d{{2}}-\d{{2}}\s*$", text, re.M):
                  text = re.sub(
                      r"^(## \[Unreleased\]\s*\n)",
                      rf"\1\n{heading}\n\n{body}\n\n",
                      text,
                      count=1,
                      flags=re.M,
                  )
              text = re.sub(rf"^\[{re.escape(version)}\]:.*\n", "", text, flags=re.M)
              text = re.sub(r"^\[Unreleased\]:.*\n", "", text, flags=re.M)
              return text.rstrip() + f"\n\n[Unreleased]: {unreleased_link}\n[{version}]: {version_link}\n"

          updated = None
          account_id = os.environ.get("CF_ACCOUNT_ID", "").strip()
          token = os.environ.get("CF_API_TOKEN", "").strip()
          if account_id and token:
              prompt = (
                  f"Update CHANGELOG.md for {repo_name} release {version} ({today}).\n\n"
                  f"Commits since {since_label}:\n{commits}\n\n"
                  f"Current CHANGELOG.md:\n```markdown\n{current}\n```\n\n"
                  "Follow Keep a Changelog. Insert the new version after `## [Unreleased]`, "
                  "clear `## [Unreleased]`, preserve prior sections, and set footer links:\n"
                  f"`[Unreleased]: {unreleased_link}` and `[{version}]: {version_link}`.\n"
                  "Return the complete CHANGELOG.md only."
              )
              try:
                  payload = json.dumps({
                      "messages": [
                          {"role": "system", "content": "You maintain Keep a Changelog files."},
                          {"role": "user", "content": prompt},
                      ],
                      "max_tokens": 4096,
                      "temperature": 0.2,
                  }).encode()
                  url = f"https://api.cloudflare.com/client/v4/accounts/{account_id}/ai/run/{model}"
                  req = urllib.request.Request(
                      url,
                      data=payload,
                      headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"},
                      method="POST",
                  )
                  with urllib.request.urlopen(req, timeout=180) as resp:
                      data = json.loads(resp.read().decode())
                  result = data.get("result") or {}
                  updated = (result.get("response") or "").strip()
                  if updated.startswith("```"):
                      updated = re.sub(r"^```(?:markdown)?\s*|\s*```$", "", updated).strip()
              except Exception as exc:
                  print(f"Cloudflare AI failed: {exc}")

          if not updated or f"## [{version}]" not in updated:
              updated = apply_fallback(current)

          changelog_path.write_text(updated if updated.endswith("\n") else updated + "\n", encoding="utf-8")

          section = re.search(
              rf"^## \[{re.escape(version)}\] - [^\n]+\n(.*?)(?=^## \[|\[Unreleased\]:|\Z)",
              updated,
              re.M | re.S,
          )
          summary = section.group(1).strip() if section else fallback_body()
          if prev_tag:
              compare_url = f"{repo_base}/compare/{prev_tag}...v{version}"
          else:
              compare_url = f"{repo_base}/releases/tag/v{version}"
          notes = f"{summary}\n\n**Full Changelog**: {compare_url}\n"
          Path("/tmp/current-release-notes.md").write_text(notes, encoding="utf-8")
          PYEOF

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${VERSION}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists, skipping."
          else
            gh release create "${TAG}" \
              --title "${VERSION}" \
              --notes-file /tmp/current-release-notes.md \
              --latest
          fi

      - name: Bump version and push
        run: |
          BASE="${VERSION%%-*}"
          IFS=. read -r MAJOR MINOR PATCH <<< "${BASE}"
          NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))-SNAPSHOT"
          sed -i.bak "s|<revision>.*</revision>|<revision>${NEXT_VERSION}</revision>|" rose-build/pom.xml
          rm -f rose-build/pom.xml.bak
          git add CHANGELOG.md rose-build/pom.xml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: bump version to next patch after publishing ${VERSION}"
            git push origin HEAD
          fi
