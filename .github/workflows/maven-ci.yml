name: Maven CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '.editorconfig'
      - '.gitattributes'
      - '.gitignore'
      - '**/*.md'
      - 'docs/**'
      - '.github/**'
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: maven-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    uses: zhijun-io/workflows/.github/workflows/maven-ci.yml@main
    with:
      java-version: '8'
      use-maven-wrapper: false
      maven-profiles: coverage
      upload-coverage: true
      run-sonar: true
      sonar-coverage-report-paths: rose-coverage/target/site/jacoco-aggregate/jacoco.xml
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
