# Rose Maven reactor: multi-JDK unit tests, JDK 8 integration tests,
# JDK 25 coverage upload (Codecov) and CodeQL security analysis.
# https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

name: Maven Build

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: maven-build-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  MAVEN_CLI_OPTS: -B -ntp

jobs:
  unit:
    name: Unit tests (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        java: [8, 11, 17, 21]
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Verify (unit tests only)
        run: mvn $MAVEN_CLI_OPTS verify -DskipITs

  integration:
    name: Integration tests (JDK 8)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 8
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 8
          cache: maven

      - name: Verify (unit + integration tests)
        run: mvn $MAVEN_CLI_OPTS verify

  coverage:
    name: Coverage and Codecov (JDK 25)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Verify with JaCoCo
        run: mvn $MAVEN_CLI_OPTS verify -Pcoverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: "**/target/site/jacoco/jacoco.xml"
          fail_ci_if_error: false

      - name: Upload JaCoCo report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: "**/target/site/jacoco/"
          retention-days: 7
          if-no-files-found: warn

  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin

      - name: Setup Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Compile for CodeQL
        run: mvn $MAVEN_CLI_OPTS -DskipTests compile

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
